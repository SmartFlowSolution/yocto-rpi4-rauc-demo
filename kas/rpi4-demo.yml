    branch: kirkstone
    commit: 97d4be2839754dadfc326c21948472c2fc2985ce
    layers:
      meta-oe:
      meta-python:
      meta-networking:

  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    branch: kirkstone
    commit: 255500dd9f6a01a3445ac491d1abc401801e3bad

  meta-rauc:
    url: https://github.com/rauc/meta-rauc.git
    branch: kirkstone
    commit: 4cb7c47686d5dec9bacae6110f1bcaac57568691

  meta-rauc-community:
    url: https://github.com/leon-anavi/meta-rauc-community.git
