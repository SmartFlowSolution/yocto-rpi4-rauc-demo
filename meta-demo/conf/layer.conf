BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-demo"
BBFILE_PATTERN_meta-demo = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-demo = "7"

LAYERDEPENDS_meta-demo = "core raspberrypi rauc"
LAYERSERIES_COMPAT_meta-demo = "kirkstone"
